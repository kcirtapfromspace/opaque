{% extends "base.html" %}

{# ── Opaque brand overlays & custom logo injection ── #}

{% block extrahead %}
  {{ super() }}
  <style>
    /* Opaque logo in header — replaces Material icon */
    .md-header__button.md-logo {
      position: relative;
    }
    .md-header__button.md-logo::after {
      content: '';
      display: block;
      width: 28px;
      height: 28px;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 32 32' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Crect x='2' y='2' width='28' height='28' rx='7' fill='rgba(59,130,246,0.08)' stroke='rgba(139,92,246,0.5)' stroke-width='1.2'/%3E%3Crect x='7' y='9' width='18' height='3.5' rx='1.75' fill='%23e8ecf1' opacity='0.7'/%3E%3Crect x='7' y='15' width='13' height='3.5' rx='1.75' fill='%23e8ecf1' opacity='0.4'/%3E%3Crect x='7' y='21' width='9' height='3.5' rx='1.75' fill='%23e8ecf1' opacity='0.18'/%3E%3C/svg%3E");
      background-size: contain;
      background-repeat: no-repeat;
    }
    .md-header__button.md-logo img,
    .md-header__button.md-logo svg {
      display: none !important;
    }
  </style>
{% endblock %}

{% block content %}
  {{ super() }}
{% endblock %}

{% block scripts %}
  {{ super() }}
  <script>
    // ── Inject Opaque visual overlays using safe DOM methods ──
    (function() {
      // Film grain noise (SVG-based)
      var nsSvg = 'http://www.w3.org/2000/svg';
      var noise = document.createElementNS(nsSvg, 'svg');
      noise.setAttribute('class', 'opaque-noise');
      noise.setAttribute('width', '100%');
      noise.setAttribute('height', '100%');
      noise.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;z-index:999;pointer-events:none;opacity:0.025;mix-blend-mode:overlay;';

      var filter = document.createElementNS(nsSvg, 'filter');
      filter.setAttribute('id', 'opaque-grain');

      var turbulence = document.createElementNS(nsSvg, 'feTurbulence');
      turbulence.setAttribute('type', 'fractalNoise');
      turbulence.setAttribute('baseFrequency', '0.8');
      turbulence.setAttribute('numOctaves', '4');
      turbulence.setAttribute('stitchTiles', 'stitch');
      filter.appendChild(turbulence);

      var colorMatrix = document.createElementNS(nsSvg, 'feColorMatrix');
      colorMatrix.setAttribute('type', 'saturate');
      colorMatrix.setAttribute('values', '0');
      filter.appendChild(colorMatrix);

      noise.appendChild(filter);

      var rect = document.createElementNS(nsSvg, 'rect');
      rect.setAttribute('width', '100%');
      rect.setAttribute('height', '100%');
      rect.setAttribute('filter', 'url(#opaque-grain)');
      noise.appendChild(rect);

      document.body.appendChild(noise);

      // CRT scanlines
      var scan = document.createElement('div');
      scan.setAttribute('class', 'opaque-scanlines');
      scan.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;z-index:998;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.02) 2px,rgba(0,0,0,0.02) 4px);';
      document.body.appendChild(scan);
    })();
  </script>
{% endblock %}
