# Opaque preset: codex-agent
#
# Tailored for OpenAI Codex CLI agent sessions. Enables agent session
# enforcement and allows GitHub secret sync and GitLab CI/CD variable
# operations with workspace scoping. All operations require first-use
# biometric approval with a 10-minute lease (one approval per Codex session).
#
# Risk: Low. Secret values are never returned to agents. Agents can set,
# list, or delete secret entries, but plaintext values are resolved inside
# opaqued and sent directly to the provider API.
#
# Usage:
#   opaque init --preset codex-agent
#   opaque connect codex

enforce_agent_sessions = true
agent_session_ttl_secs = 3600

[[known_human_clients]]
name = "opaque-cli"
exe_path = "**/opaque"

# ---- Deny agents from revealing secrets ----

[[rules]]
name = "deny-agent-reveal"
operation_pattern = "*.reveal"
allow = false
client_types = ["agent"]

# ---- GitHub secret rules (workspace-scoped) ----

[[rules]]
name = "allow-github-list-secrets"
operation_pattern = "github.list_secrets"
allow = true
client_types = ["agent"]

[rules.workspace]
require = true

[rules.approval]
require = "first_use"
factors = ["local_bio"]
lease_ttl = 600

