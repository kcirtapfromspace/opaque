name: Fuzz Testing

on:
  pull_request:
    paths:
      - 'crates/opaque-core/**'
      - 'fuzz/**'
  schedule:
    - cron: '0 2 * * 0'

permissions:
  contents: read

jobs:
  fuzz:
    name: Fuzz ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - fuzz_policy_toml
          - fuzz_ipc_request
          - fuzz_exec_profile
          - fuzz_proto_frames
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # nightly
        with:
          toolchain: nightly

      - name: Cache Cargo
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2
        with:
          workspaces: fuzz

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      - name: Run fuzzer
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            DURATION=600
          else
            DURATION=60
          fi
          cd fuzz
          cargo fuzz run ${{ matrix.target }} -- -max_total_time=$DURATION
