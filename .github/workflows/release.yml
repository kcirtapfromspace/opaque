name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag label for archive names (e.g. v0.1.0)'
        required: false
        type: string
        default: 'v0.0.0-dryrun'
      dry_run:
        description: 'Build/sign artifacts but skip GitHub Release publish'
        required: false
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Cache Cargo
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binaries
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Resolve release tag
        id: meta
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            TAG="${INPUT_TAG:-v0.0.0-dryrun}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Strip binaries
        run: |
          TARGET="${{ matrix.target }}"
          if [ "$TARGET" = "aarch64-unknown-linux-gnu" ]; then
            STRIP=aarch64-linux-gnu-strip
          else
            STRIP=strip
          fi
          for bin in opaqued opaque opaque-mcp opaque-approve-helper opaque-web; do
            "$STRIP" "target/${TARGET}/release/$bin" 2>/dev/null || true
          done

      - name: Check macOS signing secrets
        id: signing
        if: contains(matrix.target, 'apple-darwin')
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
        run: |
          if [ -n "$APPLE_CERTIFICATE" ]; then
            echo "codesign=true" >> "$GITHUB_OUTPUT"
          else
            echo "codesign=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Apple signing secrets not configured — skipping codesign"
          fi
          if [ -n "$APPLE_ID" ]; then
            echo "notarize=true" >> "$GITHUB_OUTPUT"
          else
            echo "notarize=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Codesign macOS binaries
        if: steps.signing.outputs.codesign == 'true'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          echo -n "$APPLE_CERTIFICATE" | base64 --decode -o "$CERTIFICATE_PATH"
          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          for bin in opaqued opaque opaque-mcp opaque-approve-helper opaque-web; do
            codesign --force --options runtime --sign "$APPLE_TEAM_ID" \
              "target/${{ matrix.target }}/release/$bin"
          done

      - name: Create tarball
        id: tarball
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          VERSION="${TAG#v}"
          ARCHIVE="opaque-${VERSION}-${{ matrix.target }}.tar.gz"
          tar czf "$ARCHIVE" \
            -C "target/${{ matrix.target }}/release" \
            opaqued opaque opaque-mcp opaque-approve-helper opaque-web
          echo "archive=$ARCHIVE" >> "$GITHUB_OUTPUT"

      - name: Notarize macOS tarball
        if: steps.signing.outputs.notarize == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool submit "${{ steps.tarball.outputs.archive }}" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

      - name: Generate SHA256 checksum
        run: |
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${{ steps.tarball.outputs.archive }}" > "${{ steps.tarball.outputs.archive }}.sha256"
          else
            shasum -a 256 "${{ steps.tarball.outputs.archive }}" > "${{ steps.tarball.outputs.archive }}.sha256"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: opaque-${{ matrix.target }}
          path: |
            ${{ steps.tarball.outputs.archive }}
            ${{ steps.tarball.outputs.archive }}.sha256

  release:
    name: Create release
    needs: build
    if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.dry_run) }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Resolve release tag
        id: meta
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            TAG="${INPUT_TAG:-v0.0.0-dryrun}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Download artifacts
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Install cosign
        uses: sigstore/cosign-installer@faadad0cce49287aee09b3a48701e75088a2c6ad # v4

      - name: Sign release artifacts
        run: |
          for file in artifacts/*.tar.gz; do
            cosign sign-blob --yes "$file" --output-signature "${file}.sig" --output-certificate "${file}.pem"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          generate_release_notes: true
          files: |
            artifacts/*.tar.gz
            artifacts/*.tar.gz.sha256
            artifacts/*.tar.gz.sig
            artifacts/*.tar.gz.pem
