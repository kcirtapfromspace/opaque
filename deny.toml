# cargo-deny configuration for the Opaque workspace.
# Run: cargo deny check
#
# Compatible with cargo-deny >= 0.16.

[graph]
targets = []
all-features = false
no-default-features = false

[advisories]
version = 2
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]

# Transitive dependency via indicatif. The crate is unmaintained but has no
# security issues; indicatif has not yet migrated to an alternative.
ignore = ["RUSTSEC-2025-0119"]

[licenses]
version = 2
confidence-threshold = 0.8

# Only permissive licenses are allowed.
allow = [
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "BSL-1.1",
    "CDLA-Permissive-2.0",
    "ISC",
    "MIT",
    "MIT-0",
    "OpenSSL",
    "Unicode-3.0",
    "Unlicense",
    "Zlib",
]

[[licenses.clarify]]
crate = "ring"
# ring uses a combination of ISC, MIT, and OpenSSL-style licenses.
expression = "ISC AND MIT AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
